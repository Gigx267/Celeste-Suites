<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Celeste Suites Abuja</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #E0E5EC;
            --text-main: #2C3E50;
            --text-light: #627485;
            --accent-red: #FF5A5F;
            --shadow-extrude: 12px 12px 24px rgba(163,177,198,0.7), -12px -12px 24px rgba(255,255,255,0.9);
            --shadow-inset: inset 6px 6px 12px rgba(163,177,198,0.5), inset -6px -6px 12px rgba(255,255,255,0.8);
            --glass-bg: rgba(224, 229, 236, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            line-height: 1.6;
        }

        /* --- NAVIGATION --- */
        .header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1100px; background: var(--glass-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 999px;
            padding: 10px 30px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); z-index: 1000;
        }

        .logo { font-size: 20px; font-weight: 700; color: var(--text-main); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { text-decoration: none; color: var(--text-main); font-weight: 500; font-size: 14px; transition: 0.3s; opacity: 0.8; }
        .nav-link:hover { color: var(--accent-red); opacity: 1; }

        /* --- CONTACT CONTENT --- */
        .contact-container {
            max-width: 1100px;
            margin: 150px auto 80px;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 50px;
        }

        .contact-info-card {
            background: var(--bg-main);
            padding: 40px;
            border-radius: 40px;
            box-shadow: var(--shadow-extrude);
        }

        .info-item {
            margin-bottom: 30px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .info-item i {
            font-size: 1.5rem;
            color: var(--accent-red);
            background: var(--bg-main);
            padding: 15px;
            border-radius: 15px;
            box-shadow: var(--shadow-extrude);
        }

        .contact-form {
            background: var(--bg-main);
            padding: 40px;
            border-radius: 40px;
            box-shadow: var(--shadow-extrude);
        }

        .form-group { margin-bottom: 20px; }

        .form-control {
            width: 100%;
            padding: 15px 25px;
            background: var(--bg-main);
            border: none;
            border-radius: 20px;
            box-shadow: var(--shadow-inset);
            font-family: inherit;
            color: var(--text-main);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 20px;
            background: var(--accent-red);
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 90, 95, 0.2);
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 90, 95, 0.3);
        }

        /* --- MAP SECTION --- */
        .map-section {
            width: 90%;
            max-width: 1100px;
            height: 400px;
            margin: 0 auto 100px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: var(--shadow-extrude);
        }

        @media (max-width: 768px) {
            .contact-container { grid-template-columns: 1fr; margin-top: 120px; }
            .header { width: 95%; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">Celeste Suites</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="room.html" class="nav-link">Rooms</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link" style="color: var(--accent-red); opacity: 1;">Contact</a>
        </nav>
        <div style="width: 38px; height: 38px; background: var(--accent-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">
            <i class="fas fa-phone-alt" style="font-size: 14px;"></i>
        </div>
    </header>

    <main class="contact-container">
        <div class="contact-info-card">
            <h2 style="margin-bottom: 30px; font-size: 2rem;">Get in Touch</h2>
            
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <div>
                    <h4 style="font-weight: 600;">Location</h4>
                    <p style="color: var(--text-light); font-size: 0.9rem;">House 15, 14th Road, off 2nd Avenue, Gwarinpa, Abuja.</p>
                </div>
            </div>

            <div class="info-item">
                <i class="fas fa-phone-alt"></i>
                <div>
                    <h4 style="font-weight: 600;">Phone</h4>
                    <p style="color: var(--text-light); font-size: 0.9rem;">0901 923 8653</p>
                </div>
            </div>

            <div class="info-item">
                <i class="fab fa-whatsapp"></i>
                <div>
                    <h4 style="font-weight: 600;">WhatsApp</h4>
                    <p style="color: var(--text-light); font-size: 0.9rem;">Available 24/7 for bookings</p>
                </div>
            </div>

            <div style="margin-top: 40px; display: flex; gap: 15px;">
                <a href="https://www.instagram.com/celeste_suites/" style="color: var(--text-main); font-size: 1.5rem;"><i class="fab fa-instagram"></i></a>
                <a href="#" style="color: var(--text-main); font-size: 1.5rem;"><i class="fab fa-facebook-f"></i></a>
            </div>
        </div>

        <div class="contact-form">
            <h3 style="margin-bottom: 25px;">Send a Message</h3>
            <form>
                <div class="form-group">
                    <input type="text" class="form-control" placeholder="Your Name">
                </div>
                <div class="form-group">
                    <input type="email" class="form-control" placeholder="Your Email">
                </div>
                <div class="form-group">
                    <input type="text" class="form-control" placeholder="Subject">
                </div>
                <div class="form-group">
                    <textarea class="form-control" rows="5" placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </main>

    <section class="map-section">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15759.123456789!2d7.40!3d9.11!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x104e756123456789%3A0x1234567890abcdef!2sGwarinpa%2C%20Abuja!5e0!3m2!1sen!2sng!4v1234567890" 
            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
        </iframe>
    </section>

    <footer class="footer" style="background: var(--bg-main); box-shadow: inset 0 15px 30px rgba(163,177,198,0.4); padding: 60px 5% 30px; border-radius: 60px 60px 0 0; text-align: center;">
        <p style="font-size: 13px; opacity: 0.6;">© 2026 CELESTE SUITES & APARTMENTS. DEFINED BY ELEGANCE.</p>
    </footer>

</body>
</html>
